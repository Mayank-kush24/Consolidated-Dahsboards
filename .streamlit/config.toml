[server]
port = 3005
headless = true
# enableCORS=false conflicts with enableXsrfProtection=true (Streamlit forces CORS on for XSRF cookies).
# Omit or set true; same-origin / reverse-proxy use is unaffected.
enableXsrfProtection = true

[browser]
gatherUsageStats = false

[theme]
primaryColor = "#6366f1"
backgroundColor = "#0f172a"
secondaryBackgroundColor = "#1e293b"
textColor = "#e2e8f0"
font = "sans serif"
